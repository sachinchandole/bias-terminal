services:
  - type: web
    name: bias-terminal
    env: python
    plan: free
    region: singapore   # closest Render region to India for low latency
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
